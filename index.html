<!DOCTYPE html>
<html>
<head>
    <title>Goog Company</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        #title {
            font-size: clamp(4rem, 15vw, 10rem);
            font-weight: 900;
            color: #ffffff;
            letter-spacing: -2px;
            text-shadow: 0 0 40px rgba(255,255,255,0.08);
            min-height: 1.2em;
            display: flex;
            align-items: center;
        }

        .cursor {
            display: inline-block;
            width: 0.08em;
            height: 1em;
            background: #fff;
            margin-left: 4px;
            animation: blink 0.7s step-end infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        #ascii-wrapper {
            margin-top: 3rem;
            opacity: 0;
            transition: opacity 1.5s ease;
            width: 100%;
            max-width: 900px;
            padding: 0 1rem;
            overflow: hidden;
        }

        #ascii-wrapper.visible {
            opacity: 1;
        }

        #ascii {
            font-size: clamp(3px, 1vw, 7px);
            line-height: 1.1;
            color: #555;
            white-space: pre;
            overflow: hidden;
            display: block;
            font-family: 'Courier New', monospace;
        }

        #tagline {
            margin-top: 2rem;
            font-size: 1rem;
            color: #444;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #tagline.visible {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="title"><span id="typed"></span><span class="cursor"></span></div>
    <div id="tagline">the goog company</div>

    <div id="ascii-wrapper">
        <pre id="ascii"></pre>
    </div>

        const word = "Goog";
        let i = 0;
        const typedEl = document.getElementById('typed');
        const tagline = document.getElementById('tagline');
        const asciiWrapper = document.getElementById('ascii-wrapper');
        const asciiEl = document.getElementById('ascii');

        function typeNext() {
            if (i <= word.length) {
                typedEl.textContent = word.slice(0, i);
                i++;
                const delay = i === 1 ? 400 : 120 + Math.random() * 80;
                setTimeout(typeNext, delay);
            } else {
                setTimeout(() => {
                    tagline.classList.add('visible');
                    asciiEl.textContent = asciiArt;
                    asciiWrapper.classList.add('visible');
                }, 600);
            }
        }

        setTimeout(typeNext, 800);
    </script>
